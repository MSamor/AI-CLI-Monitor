<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="AI CLI Monitor app icon">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="850" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121826"/>
      <stop offset="0.45" stop-color="#171b2f"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="panel" x1="210" y1="250" x2="780" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#24304a"/>
      <stop offset="1" stop-color="#101722"/>
    </linearGradient>
    <linearGradient id="ring" x1="220" y1="210" x2="820" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6df7ff"/>
      <stop offset="0.52" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#ff4f87"/>
    </linearGradient>
    <linearGradient id="terminal" x1="290" y1="324" x2="720" y2="714" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161f2e"/>
      <stop offset="1" stop-color="#050b12"/>
    </linearGradient>
    <radialGradient id="glowRed" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(704 338) rotate(90) scale(170)">
      <stop offset="0" stop-color="#ff5b7b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ff5b7b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(346 666) rotate(90) scale(210)">
      <stop offset="0" stop-color="#54eaff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#54eaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="lineGlow" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect x="64" y="64" width="896" height="896" rx="210"/>
    </clipPath>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="210" fill="url(#bg)"/>
  <g clip-path="url(#rounded)">
    <circle cx="704" cy="338" r="210" fill="url(#glowRed)"/>
    <circle cx="346" cy="666" r="250" fill="url(#glowCyan)"/>
    <path d="M158 742C294 624 359 531 493 542C629 553 676 446 866 300" fill="none" stroke="#27344d" stroke-width="34" opacity="0.55"/>
    <path d="M168 778C324 639 393 612 527 632C652 651 725 553 876 462" fill="none" stroke="#24304a" stroke-width="22" opacity="0.42"/>
  </g>

  <rect x="170" y="170" width="684" height="684" rx="180" fill="none" stroke="url(#ring)" stroke-width="26" opacity="0.92"/>
  <rect x="220" y="258" width="584" height="508" rx="84" fill="url(#panel)" filter="url(#softShadow)"/>
  <rect x="260" y="308" width="504" height="390" rx="56" fill="url(#terminal)" stroke="#31405c" stroke-width="6"/>

  <g opacity="0.92">
    <circle cx="325" cy="365" r="18" fill="#ff5d7a"/>
    <circle cx="378" cy="365" r="18" fill="#ffd35a"/>
    <circle cx="431" cy="365" r="18" fill="#54e88b"/>
  </g>

  <g filter="url(#lineGlow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M354 500L428 560L354 620" fill="none" stroke="#71f6ff" stroke-width="38"/>
    <path d="M480 623H612" fill="none" stroke="#f5f7ff" stroke-width="38"/>
  </g>

  <g transform="translate(640 408)">
    <circle cx="74" cy="74" r="82" fill="#121b29" stroke="#ff4f87" stroke-width="16"/>
    <path d="M74 28V120L118 82" fill="none" stroke="#ff86a8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M74 120L30 82" fill="none" stroke="#ff86a8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="74" cy="74" r="23" fill="#ff4f87"/>
  </g>

  <g transform="translate(290 640)">
    <rect x="0" y="0" width="444" height="76" rx="38" fill="#09121b" stroke="#2f405d" stroke-width="4"/>
    <circle cx="58" cy="38" r="18" fill="#54e88b"/>
    <circle cx="116" cy="38" r="18" fill="#ffd35a"/>
    <circle cx="174" cy="38" r="18" fill="#ff5d7a"/>
    <path d="M240 38H388" stroke="#81f6ff" stroke-width="18" stroke-linecap="round" opacity="0.86"/>
  </g>

  <path d="M262 236C360 176 492 151 614 184" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.12"/>
</svg>
