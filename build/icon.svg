<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="AI CLI Monitor app icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="prompt-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="226" fill="url(#bg)"/>

  <!-- 终端窗口主体 -->
  <g filter="url(#soft-shadow)">
    <rect x="140" y="280" width="744" height="520" rx="56" fill="url(#terminal)"/>

    <!-- 窗口顶栏 -->
    <rect x="140" y="280" width="744" height="80" rx="56" fill="#1e293b"/>
    <rect x="140" y="320" width="744" height="40" fill="#1e293b"/>

    <!-- 窗口控制按钮 -->
    <circle cx="200" cy="320" r="14" fill="#ef4444"/>
    <circle cx="250" cy="320" r="14" fill="#f59e0b"/>
    <circle cx="300" cy="320" r="14" fill="#22c55e"/>
  </g>

  <!-- CLI 提示符 -->
  <g filter="url(#glow-filter)">
    <path d="M220 460 L310 530 L220 600"
          fill="none"
          stroke="url(#prompt-grad)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- 光标 -->
    <rect x="350" y="505" width="28" height="50" rx="4" fill="#3b82f6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 代码行装饰 -->
  <rect x="220" y="650" width="280" height="16" rx="8" fill="#334155" opacity="0.4"/>
  <rect x="220" y="690" width="420" height="16" rx="8" fill="#334155" opacity="0.3"/>
  <rect x="220" y="730" width="200" height="16" rx="8" fill="#334155" opacity="0.2"/>

  <!-- 状态指示灯组 -->
  <g transform="translate(680, 500)">
    <!-- 灯座 -->
    <rect x="-60" y="-30" width="120" height="200" rx="28" fill="#0f172a" opacity="0.6"/>

    <!-- 三色状态灯 -->
    <g filter="url(#glow-filter)">
      <circle cx="0" cy="10" r="26" fill="#22c55e" opacity="0.9"/>
      <circle cx="0" cy="10" r="18" fill="#34d399"/>

      <circle cx="0" cy="80" r="26" fill="#f59e0b" opacity="0.9"/>
      <circle cx="0" cy="80" r="18" fill="#fbbf24"/>

      <circle cx="0" cy="150" r="26" fill="#ef4444" opacity="0.9"/>
      <circle cx="0" cy="150" r="18" fill="#f87171"/>
    </g>
  </g>

  <!-- AI 装饰元素 -->
  <g opacity="0.15">
    <circle cx="512" cy="512" r="380" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="512" cy="512" r="420" fill="none" stroke="#06b6d4" stroke-width="1"/>
  </g>
</svg>
