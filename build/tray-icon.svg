<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 极简托盘图标 - 只用基本形状 -->

  <!-- 外框 - 简单矩形 -->
  <rect x="4" y="6" width="24" height="20" fill="none" stroke="black" stroke-width="2" rx="2"/>

  <!-- 顶部分隔线 -->
  <line x1="4" y1="11" x2="28" y2="11" stroke="black" stroke-width="2"/>

  <!-- 命令提示符 > 用简单折线 -->
  <polyline points="9,15 13,18 9,21" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 光标 -->
  <rect x="16" y="17" width="4" height="2" fill="black"/>
</svg>
