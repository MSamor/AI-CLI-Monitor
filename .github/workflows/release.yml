name: 构建 Release 客户端

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-2022
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 固定 Windows Python
        if: runner.os == 'Windows'
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          update-environment: false

      - name: 初始化 Windows MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: 配置 Windows 原生编译环境
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python --version
          where.exe python
          where.exe msbuild
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "未找到包含 C++ 工具链的 Visual Studio 2022。"
          }
          Write-Host "Visual Studio: $vsPath"
          "GYP_MSVS_VERSION=2022" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GYP_MSVS_OVERRIDE_PATH=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: 安装 Linux 蓝牙构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libudev-dev

      - name: 安装项目依赖（Windows）
        if: runner.os == 'Windows'
        run: npm ci

      - name: 安装项目依赖
        if: runner.os != 'Windows'
        run: npm ci

      - name: 输出打包元信息
        run: node -e "const p=require('./package.json'); console.log({author:p.author, homepage:p.homepage, linux:p.build.linux, deb:p.build.deb})"

      - name: 配置 macOS 签名和公证密钥
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8_SECRET: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          append_env() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              {
                echo "$name<<EOF"
                echo "$value"
                echo "EOF"
              } >> "$GITHUB_ENV"
            fi
          }

          append_env CSC_LINK "$CSC_LINK_SECRET"
          append_env CSC_KEY_PASSWORD "$CSC_KEY_PASSWORD_SECRET"

          if [ -n "$APPLE_API_KEY_P8_SECRET" ] && [ -n "$APPLE_API_KEY_ID_SECRET" ] && [ -n "$APPLE_API_ISSUER_SECRET" ]; then
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_SECRET}.p8"
            printf '%s' "$APPLE_API_KEY_P8_SECRET" > "$key_path"
            chmod 600 "$key_path"
            append_env APPLE_API_KEY "$key_path"
            append_env APPLE_API_KEY_ID "$APPLE_API_KEY_ID_SECRET"
            append_env APPLE_API_ISSUER "$APPLE_API_ISSUER_SECRET"
          fi

      - name: 构建并打包客户端
        run: npm run dist

      - name: 上传构建产物到工作流
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-monitor-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 📦 安装包下载

            - **Windows**: 下载 `.exe` 安装包
            - **macOS**: 下载 `.dmg` 或 `.zip` 文件
            - **Linux**: 下载 `.AppImage` 或 `.deb` 包

            ## ✨ 本次更新

            - 🏝️ 启动后默认打开桌面灵动岛，并记住上次位置。
            - 🖥️ 主窗口关闭后进入状态栏/托盘，点击托盘图标可重新打开。
            - 🧠 支持 Claude / Codex hook 状态监听，区分 AI 生成中、等待确认和空闲。
            - 🔵 支持 Pico 2 W BLE 指示灯；没有硬件时可使用模拟蓝牙模式。
            - ⏱️ AI 生成中兜底超时已调长，适配几分钟的长输出任务。

            ## ⚠️ 验证状态

            当前版本尚未完成完整端到端验证。首次使用建议先用模拟蓝牙模式验证软件状态，再配置 hook 和真实 Pico 硬件。

            ## 🪝 首次配置

            启动应用后，请按 README 配置 Claude / Codex hooks：

            - Claude: `scripts/claude-hook.js`
            - Codex: `scripts/codex-hook.js` 和 `scripts/codex-hooks.json`

            下方自动生成的更新日志包含本次 tag 对应的 commit / PR 记录。

            ---

            > **首次使用？** 请查看 [README](https://github.com/${{ github.repository }}) 了解使用说明
