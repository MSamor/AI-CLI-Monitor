name: 构建 Release 客户端

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-2022
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 固定 Windows Python
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 配置 Windows 原生模块编译环境
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm config set msvs_version 2022
          npm config set python "$env:pythonLocation\python.exe"

      - name: 安装 Linux 蓝牙构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libudev-dev

      - name: 安装项目依赖
        run: npm ci

      - name: 构建并打包客户端
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传构建产物到工作流
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-monitor-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
