name: 构建 Release 客户端

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-2022
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 固定 Windows Python
        if: runner.os == 'Windows'
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 初始化 Windows MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: 检查 Windows 原生编译环境
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python --version
          where.exe python
          where.exe msbuild
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "未找到包含 C++ 工具链的 Visual Studio 2022。"
          }
          Write-Host "Visual Studio: $vsPath"
          "GYP_MSVS_VERSION=2022" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GYP_MSVS_OVERRIDE_PATH=$vsPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "npm_config_msvs_version=2022" | Out-File -FilePath $env:GITHUB_ENV -Append
          "npm_config_python=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: 安装 Linux 蓝牙构建依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbluetooth-dev libudev-dev

      - name: 安装项目依赖（Windows）
        if: runner.os == 'Windows'
        run: npm ci

      - name: 安装项目依赖
        if: runner.os != 'Windows'
        run: npm ci

      - name: 输出打包元信息
        run: node -e "const p=require('./package.json'); console.log({author:p.author, homepage:p.homepage, linux:p.build.linux, deb:p.build.deb})"

      - name: 构建并打包客户端
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 上传构建产物到工作流
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-monitor-${{ runner.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          generate_release_notes: true
